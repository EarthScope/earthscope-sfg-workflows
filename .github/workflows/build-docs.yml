name: Build Docs on Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip and Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Generate API Markdown
        run: python scripts/generate_api_md.py

      - name: Build docs
        run: myst build --html

      # Optionally, upload docs as artifact for inspection
      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: _build/html/
