name: Build Docs on Push

on:
  push:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pip and Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Generate API Markdown
        run: python scripts/generate_api_md.py

      - name: Build docs
        run: myst build --html

      # Optionally, upload docs as artifact for inspection
      - name: Upload built docs
        uses: actions/upload-artifact@v7
        with:
          name: site-html
          path: _build/html/
