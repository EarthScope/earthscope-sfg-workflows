name: Build Docs on Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: docs
          locked: false

      - name: Generate API Markdown
        run: pixi run -e docs python scripts/generate_api_md.py

      - name: Build docs
        run: pixi run -e docs docs-build

      # Optionally, upload docs as artifact for inspection
      - name: Upload built docs
        uses: actions/upload-artifact@v7
        with:
          name: site-html
          path: _build/html/
